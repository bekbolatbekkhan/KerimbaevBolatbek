spring:
  application:
    name: SalpykovDalelLibrary

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/library_db}
    username: ${SPRING_DATASOURCE_USERNAME:library_user}
    password: ${SPRING_DATASOURCE_PASSWORD:library_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    com.lab.SalpykovDalel: DEBUG
  file:
    name: ${LOG_FILE:logs/application.log}

jwt:
  secret: ${JWT_SECRET:c2FscHlrb3ZkYWxlbHNlY3JldGtleWZvcmxpYnJhcnlhcHBsaWNhdGlvbjEyMzQ1Njc4OTA=}
  expiration: ${JWT_EXPIRATION:86400000}

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}